<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Football Analyzer">
    <title>Football Analyzer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0e1117; 
            color: #fafafa; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: #1a1f2e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3748;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .header .status {
            font-size: 12px;
            color: #48bb78;
        }
        .iframe-container {
            height: calc(100vh - 50px);
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .install-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
            display: none;
        }
        .install-btn.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1> Football Analyzer</h1>
        <span class="status">● Online</span>
    </div>
    <div class="iframe-container">
        <iframe src="https://football-analytics-zvqew9md9bvgxwxrr3y4b8.streamlit.app/?embed=true&embed_options=show_padding" loading="lazy"></iframe>
    </div>
    <button class="install-btn" id="installBtn"> Установить</button>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.remove('show');
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('show');
            console.log('PWA installed');
        });
    </script>
</body>
</html>
