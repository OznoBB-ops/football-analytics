name: Update Football Data

on:
  schedule:
    # Запускается каждый день в 6:00 UTC (9:00 по Москве)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Можно запустить вручную

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas requests
      
      - name: Download and update data
        run: |
          python update_data.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update: $(date +%Y-%m-%d)" && git push)
